<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RockPaperSciessor Game</title>
    <link rel="stylesheet" href="RockPaperSciessor.css" />
  </head>
  <body>
    <div class="title">Rock Paper Sciessor</div>
    <div class="choices">
      <div class="choice" id="rock">
        <img src="./images/rock.png" alt="" />
      </div>
      <div class="choice" id="paper">
        <img src="./images/paper.png" alt="" />
      </div>
      <div class="choice" id="scissors">
        <img src="./images/scissors.png" alt="" />
      </div>
    </div>
    <div class="review">
      <p id="userReview"></p>
      <p id="compReview"></p>
    </div>
    <div class="score-board">
      <div class="score">
        <p id="user">0</p>
        <p>You</p>
      </div>
      <div class="score">
        <p id="computer">0</p>
        <p>Computer</p>
      </div>
    </div>
    <div class="msg-container">
      <p id="msg">play your turn</p>
    </div>
  </body>
  <script src="RockPaperSciessor.js"></script>
</html>
